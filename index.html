<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col p-4">
    <div id="chat" class="flex-1 overflow-y-auto mb-4 space-y-2"></div>
    <div class="flex gap-2">
        <input id="input" class="flex-1 p-2 rounded border" placeholder="Escribe algo...">
        <button onclick="send()" class="bg-black text-white px-4 py-2 rounded">Enviar</button>
    </div>
<script>
    const chat = document.getElementById('chat');
    let history = [];
    async function send() {
        const text = document.getElementById('input').value;
        if(!text) return;
        history.push({role: "user", content: text});
        chat.innerHTML += `<p><b>Tú:</b> ${text}</p>`;
        document.getElementById('input').value = '';
        const res = await fetch('/.netlify/functions/chat', {
            method: 'POST',
            body: JSON.stringify({ messages: history })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        history.push({role: "assistant", content: reply});
        chat.innerHTML += `<p class="text-blue-600"><b>Groq:</b> ${reply}</p>`;
    }
</script>
</body>
</html>
